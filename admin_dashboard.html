<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة التحكم الإدارية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7);
            --secondary-gradient: linear-gradient(135deg, #3b82f6, #06b6d4);
            --accent-gradient: linear-gradient(135deg, #f43f5e, #fb923c);
            --bg: #f0f4f8;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .grid { display: grid; gap: 20px; }
        
        .card { 
            background: var(--white); padding: 20px; border-radius: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.08); 
            cursor: pointer; transition: transform 0.3s;
            display: flex; align-items: center; gap: 20px;
        }
        .card:hover { transform: translateY(-5px); }
        .icon { width: 55px; height: 55px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 1000; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 15px; background: var(--primary-gradient); color: white; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-close { background: #64748b; margin-top: 15px; }
        input, select { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 10px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { color: #94a3b8; text-align: right; padding: 10px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>لوحة الإدارة</h1></div>
    
    <div class="grid">
        <div class="card" onclick="openModal('studentsModal')" style="border-right: 6px solid #6366f1;">
            <div class="icon" style="background: var(--primary-gradient);">👨‍🎓</div>
            <div><h2 style="margin:0;">الطلاب</h2><p style="color:#64748b; margin:0;">بيانات المسجلين</p></div>
        </div>
        
        <div class="card" onclick="openModal('lecturesModal')" style="border-right: 6px solid #3b82f6;">
            <div class="icon" style="background: var(--secondary-gradient);">📹</div>
            <div><h2 style="margin:0;">المحاضرات</h2><p style="color:#64748b; margin:0;">إدارة الحصص</p></div>
        </div>

        <div class="card" onclick="openModal('gradesModal')" style="border-right: 6px solid #f43f5e;">
            <div class="icon" style="background: var(--accent-gradient);">📊</div>
            <div><h2 style="margin:0;">الدرجات</h2><p style="color:#64748b; margin:0;">رصد النتائج</p></div>
        </div>
    </div>
</div>

<div id="studentsModal" class="modal"><div class="modal-content">
    <h2>الطلاب</h2>
    <button class="btn-action" onclick="exportTableToExcel('stTable', 'الطلاب')">📥 تصدير Excel</button>
    <table id="stTable"><thead><tr id="stHead"></tr></thead><tbody id="stBody"></tbody></table>
    <button class="btn-action btn-close" onclick="closeModals()">إغلاق</button>
</div></div>

<div id="lecturesModal" class="modal"><div class="modal-content">
    <h2>إدارة المحاضرات</h2>
    <input type="text" id="lecT" placeholder="العنوان">
    <input type="text" id="lecC" placeholder="الفصل">
    <input type="url" id="lecU" placeholder="رابط الفيديو">
    <button class="btn-action" onclick="addLecture()">إضافة</button>
    <table id="lecTable"><thead><tr><th>العنوان</th><th>تحكم</th></tr></thead><tbody id="lecBody"></tbody></table>
    <button class="btn-action btn-close" onclick="closeModals()">إغلاق</button>
</div></div>

<div id="gradesModal" class="modal"><div class="modal-content">
    <h2>الدرجات</h2>
    <select id="sSelect"></select>
    <input type="text" id="subName" placeholder="المادة">
    <input type="number" id="sScore" placeholder="الدرجة">
    <button class="btn-action" onclick="addGrade()">حفظ</button>
    <table id="gTable"><thead><tr><th>الطالب</th><th>المادة</th><th>الدرجة</th></tr></thead><tbody id="gBody"></tbody></table>
    <button class="btn-action btn-close" onclick="closeModals()">إغلاق</button>
</div></div>

<script>
    const sb = supabase.createClient('https://fhtmlqihsuaqcedoqvxr.supabase.co', 'sb_publishable_9wqupRTtM78NviSwAoJENw_1UalvspY');

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    async function loadData() {
        const { data: st } = await sb.from('students').select('*');
        if (st && st.length > 0) {
            const keys = Object.keys(st[0]);
            document.getElementById('stHead').innerHTML = keys.map(k => `<th>${k}</th>`).join('');
            document.getElementById('stBody').innerHTML = st.map(row => `<tr>${keys.map(k => `<td>${row[k]}</td>`).join('')}</tr>`).join('');
            document.getElementById('sSelect').innerHTML = st.map(s => `<option value="${s.full_name}">${s.full_name}</option>`).join('');
        }

        const { data: lc } = await sb.from('lectures').select('*');
        if (lc) document.getElementById('lecBody').innerHTML = lc.map(l => `<tr><td>${l.title}</td><td><button onclick="deleteLecture('${l.id}')" style="background:#ef4444; border:none; color:white; border-radius:5px; padding:5px;">🗑️</button></td></tr>`).join('');

        const { data: gr } = await sb.from('grades').select('*');
        if (gr) document.getElementById('gBody').innerHTML = gr.map(g => `<tr><td>${g.student_name}</td><td>${g.subject_name}</td><td>${g.score}</td></tr>`).join('');
    }

    async function addLecture() {
        const title = document.getElementById('lecT').value;
        const chapter = document.getElementById('lecC').value;
        const url = document.getElementById('lecU').value;
        if(!title || !chapter || !url) return alert("يرجى ملء الحقول");
        await sb.from('lectures').insert([{ title, chapter_name: chapter, youtube_url: url }]);
        alert('تمت الإضافة'); loadData();
    }

    async function deleteLecture(id) {
        await sb.from('lectures').delete().eq('id', id);
        loadData();
    }

    async function addGrade() {
        await sb.from('grades').insert([{ student_name: document.getElementById('sSelect').value, subject_name: document.getElementById('subName').value, score: Number(document.getElementById('sScore').value) }]);
        alert('تم الحفظ'); loadData();
    }

    function exportTableToExcel(id, name) { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById(id)), name + ".xlsx"); }

    loadData();
</script>
</body>
</html>
