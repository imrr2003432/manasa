<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة التحكم الإدارية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #007aff;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --sidebar: #0f172a;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --border-radius: 20px;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background: var(--sidebar);
            position: fixed;
            top: 0;
            right: 0;
            padding: 30px 20px;
            z-index: 1000;
        }

        .sidebar h2 { color: #ffffff; margin-bottom: 40px; font-weight: 800; }

        .nav-item {
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: 0.3s;
            font-weight: 600;
            color: #94a3b8;
        }

        .nav-item:hover, .nav-item.active {
            background: #1e293b;
            color: #ffffff;
        }

        .main { margin-right: 260px; padding: 40px; width: calc(100% - 260px); }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; }
        th { color: var(--text-secondary); font-weight: 600; padding: 15px; text-align: right; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-delete { background: #ef4444; padding: 8px 12px; font-size: 12px; }
        .btn:active { transform: scale(0.96); }
        .btn-excel { background: #10b981; margin-bottom: 15px; width: 100%; }

        input, select {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            background: #f8fafc;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; display: flex; align-items: center; justify-content: space-around; padding: 10px; }
            .sidebar h2 { display: none; }
            .nav-item { margin-bottom: 0; font-size: 11px; padding: 8px; text-align: center; }
            .main { margin-right: 0; width: 100%; padding: 20px; padding-bottom: 100px; }
            .input-group { flex-direction: column; }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <h2>الإدارة</h2>
        <div class="nav-item active" onclick="showSection('students', this)">👨‍🎓 الطلاب</div>
        <div class="nav-item" onclick="showSection('lectures', this)">📹 المحاضرات</div>
        <div class="nav-item" onclick="showSection('grades', this)">📊 الدرجات</div>
        <div class="nav-item" onclick="logout()" style="color: #ef4444;">🚪 خروج</div>
    </aside>

    <main class="main">
        <section id="students" class="content-section">
            <div class="card">
                <h1 style="font-size: 24px; margin-bottom: 20px;">بيانات الطلاب</h1>
                <button class="btn btn-excel" onclick="exportTableToExcel('stTable', 'الطلاب')">📥 تصدير البيانات إلى Excel</button>
                <div style="overflow-x: auto;">
                    <table id="stTable">
                        <thead id="stHead"></thead>
                        <tbody id="stBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="lectures" class="content-section" style="display:none;">
            <div class="card">
                <h1>إدارة المحاضرات</h1>
                <div class="input-group" style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="lecT" placeholder="العنوان" style="flex: 1;">
                    <input type="text" id="lecC" placeholder="الفصل" style="flex: 1;">
                    <input type="url" id="lecU" placeholder="رابط الفيديو" style="flex: 1;">
                    <button class="btn" onclick="addLecture()">إضافة</button>
                </div>
                <div style="overflow-x: auto;">
                    <table id="lecTable">
                        <thead><tr><th>العنوان</th><th>الفصل</th><th>الرابط</th><th>تحكم</th></tr></thead>
                        <tbody id="lecBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="grades" class="content-section" style="display:none;">
            <div class="card">
                <h1>رفع الدرجات</h1>
                <div class="input-group" style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <select id="sSelect" style="flex: 1;"></select>
                    <input type="text" id="subName" placeholder="المادة">
                    <input type="number" id="sScore" placeholder="الدرجة">
                    <button class="btn" onclick="addGrade()">حفظ</button>
                </div>
                <div style="overflow-x: auto;">
                    <table id="gTable">
                        <thead><tr><th>الطالب</th><th>المادة</th><th>الدرجة</th></tr></thead>
                        <tbody id="gBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        const sb = supabase.createClient('https://fhtmlqihsuaqcedoqvxr.supabase.co', 'sb_publishable_9wqupRTtM78NviSwAoJENw_1UalvspY');

        function showSection(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        async function loadData() {
            const { data: st } = await sb.from('students').select('*');
            if (st && st.length > 0) {
                const keys = Object.keys(st[0]);
                document.getElementById('stHead').innerHTML = `<tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr>`;
                document.getElementById('stBody').innerHTML = st.map(row => 
                    `<tr>${keys.map(k => `<td>${row[k] || '-'}</td>`).join('')}</tr>`
                ).join('');
                document.getElementById('sSelect').innerHTML = st.map(s => `<option value="${s.full_name}">${s.full_name}</option>`).join('');
            }

            const { data: lc } = await sb.from('lectures').select('*');
            if (lc) {
                document.getElementById('lecBody').innerHTML = lc.map(l => 
                    `<tr><td>${l.title}</td><td>${l.chapter_name}</td><td>${l.youtube_url}</td>
                    <td><button class="btn btn-delete" onclick="deleteLecture('${l.id}')">🗑️</button></td></tr>`
                ).join('');
            }

            const { data: gr } = await sb.from('grades').select('*');
            if (gr) document.getElementById('gBody').innerHTML = gr.map(g => `<tr><td>${g.student_name}</td><td>${g.subject_name}</td><td>${g.score}</td></tr>`).join('');
        }

        function exportTableToExcel(tableId, filename) {
            const wb = XLSX.utils.table_to_book(document.getElementById(tableId), { sheet: "Sheet1" });
            XLSX.writeFile(wb, filename + ".xlsx");
        }

        async function addLecture() {
            const title = document.getElementById('lecT').value;
            const chapter = document.getElementById('lecC').value;
            const url = document.getElementById('lecU').value;
            if(!title || !chapter || !url) return alert("يرجى ملء جميع الحقول");
            await sb.from('lectures').insert([{ title, chapter_name: chapter, youtube_url: url }]);
            alert('تم الإضافة!'); loadData();
        }

        async function deleteLecture(id) {
            if(!confirm('هل أنت متأكد من حذف هذه المحاضرة؟')) return;
            await sb.from('lectures').delete().eq('id', id);
            alert('تم الحذف!'); loadData();
        }

        async function addGrade() {
            const sSelect = document.getElementById('sSelect');
            await sb.from('grades').insert([{ student_name: sSelect.value, subject_name: document.getElementById('subName').value, score: Number(document.getElementById('sScore').value) }]);
            alert('تم الحفظ!'); loadData();
        }

        // تم التعديل هنا ليوجه المستخدم إلى dashboard.html عند تسجيل الخروج
        function logout() { 
            sb.auth.signOut(); 
            window.location.href = 'dashbord.html'; 
        }

        loadData();
    </script>
</body>
</html>
