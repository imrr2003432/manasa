<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المنصة التعليمية المتقدمة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-orange: #f97316;
            --accent-green: #10b981;
            --admin-red: #c2410c;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 20px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }

        .top-bar { margin-bottom: 30px; }
        .hero-banner { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 20px; padding: 32px; color: #ffffff; margin-bottom: 30px; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        
        .panel-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; text-decoration: none; color: var(--text-main); transition: 0.25s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); display: block; cursor: pointer; }
        .panel-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .admin-card { border: 2px solid var(--admin-red); }
        .admin-card h3 { color: var(--admin-red); }

        .icon-wrapper { width: 48px; height: 48px; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        
        .bg-light-blue { background-color: #e0f2fe; color: var(--accent-blue); }
        .bg-light-purple { background-color: #f3e8ff; color: var(--accent-purple); }
        .bg-light-orange { background-color: #ffedd5; color: var(--accent-orange); }
        .bg-light-green { background-color: #d1fae5; color: var(--accent-green); }
        .bg-light-red { background-color: #fee2e2; color: var(--admin-red); }
        .bg-light-gray { background-color: #f1f5f9; color: var(--text-muted); }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .social-links { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .social-links a { text-decoration: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; }

        @media (max-width: 768px) {
            body { padding: 15px; }
            .hero-banner { padding: 20px; }
        }
    </style>
</head>

<body>

    <div class="container">
        <header class="top-bar">
            <h1 id="greeting" style="font-size: 22px;">مرحباً بك</h1>
            <p id="currentDate" style="color: var(--text-muted); font-size: 14px;"></p>
        </header>

        <section class="hero-banner">
            <h2 style="margin-bottom: 10px;">مرحباً بك في منصة الاستاذ محمد</h2>
            <p>إدارة ملفك الدراسي ومتابعة الحصص بكل سهولة.</p>
        </section>

        <section class="dashboard-grid">
            <a href="admin_dashboard.html" id="admin-card" class="panel-card admin-card" style="display: none;">
                <div class="icon-wrapper bg-light-red"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></div>
                <h3>لوحة تحكم الآدمن</h3>
            </a>

            <a href="students_form.html" class="panel-card">
                <div class="icon-wrapper bg-light-blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg></div>
                <h3>استمارة البيانات</h3>
            </a>
            <a href="lectures.html" class="panel-card">
                <div class="icon-wrapper bg-light-purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6 17h12a2.5 2.5 0 0 1 2.5 2.5V4a2.5 2.5 0 0 0-2.5-2.5H6A2.5 2.5 0 0 0 3.5 4v15.5z"></path></svg></div>
                <h3>المحاضرات</h3>
            </a>
            <a href="exams.html" class="panel-card">
                <div class="icon-wrapper bg-light-orange"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>
                <h3>الامتحانات</h3>
            </a>
            <a href="results.html" class="panel-card">
                <div class="icon-wrapper bg-light-green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg></div>
                <h3>النتائج</h3>
            </a>
            
            <div class="panel-card" onclick="toggleModal(true)">
                <div class="icon-wrapper bg-light-gray"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></div>
                <h3>تواصل معنا</h3>
            </div>
        </section>
    </div>

    <div id="contactModal" class="modal-overlay" onclick="toggleModal(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>تواصل معنا</h3>
            <div class="social-links">
                <a href="https://t.me/xy_math11" style="background: #0088cc;">تليكرام</a>
                <a href="#" style="background: #ff0000;">يوتيوب</a>
                <a href="#" style="background: #e1306c;">انستغرام</a>
                <a href="#" style="background: #4267B2;">فيسبوك</a>
            </div>
            <button onclick="toggleModal(false)" style="margin-top:20px; padding:10px 20px; border:none; border-radius:10px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://fhtmlqihsuaqcedoqvxr.supabase.co', 'sb_publishable_9wqupRTtM78NviSwAoJENw_1UalvspY');

        function toggleModal(show) {
            document.getElementById('contactModal').style.display = show ? 'flex' : 'none';
        }

        async function checkAdminAccess() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                const { data: profile } = await sb.from('profiles').select('role').eq('id', session.user.id).single();
                if (profile && profile.role === 'admin') {
                    document.getElementById('admin-card').style.display = 'block';
                }
            }
        }
        checkAdminAccess();

        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ar-IQ', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('greeting').textContent = new Date().getHours() < 12 ? 'صباح الخير 👋' : 'مساء الخير 👋';
    </script>
</body>
</html>
